{% extends "logistics/base.html" %}
{% block title %}Supprimer la mission - Control Tower{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2">Supprimer la mission</h1>
    <a href="{% url 'logistics:mission_list' %}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Annuler</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <p>Êtes-vous sûr de vouloir supprimer la mission "{{ mission }}" ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
            <a href="{% url 'logistics:mission_list' %}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
