<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Control Tower{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Leaflet CSS (ajout) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            background-color: #f8f9fc;
        }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f, #0f2b3d);
            color: white;
        }
        .sidebar a {
            color: #d1d5db;
            text-decoration: none;
            display: block;
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }
        .main-content {
            padding: 2rem;
        }
        .card-stats {
            border-left: 4px solid #2563eb;
        }
        .badge-status {
            padding: 0.35rem 0.65rem;
            border-radius: 50rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-PLANNED { background-color: #6c757d; color: white; }
        .status-LOADING { background-color: #fd7e14; color: white; }
        .status-IN_TRANSIT { background-color: #0d6efd; color: white; }
        .status-ARRIVED { background-color: #198754; color: white; }
        .status-UNLOADING { background-color: #ffc107; color: black; }
        .status-COMPLETED { background-color: #20c997; color: white; }
        .status-CANCELLED { background-color: #dc3545; color: white; }
        /* Styles pour la carte */
        #leaflet-map {
            height: 520px;
            width: 100%;
            border-radius: 28px;
            z-index: 1;
        }
        .map-container {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
        }
        .map-legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 12px 18px;
            border-radius: 16px;
            z-index: 1000;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(0,0,0,0.1);
            pointer-events: none;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-0">
                <div class="position-sticky">
                    <div class="p-3 text-center border-bottom">
                        <h4><i class="fas fa-tower-cell"></i> Control Tower</h4>
                        <small>Logistics Platform</small>
                    </div>
                    <ul class="nav flex-column mt-3">
                        <li class="nav-item">
                            <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'logistics:dashboard' %}">
                                <i class="fas fa-chart-line me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if 'depot' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'logistics:depot_list' %}">
                                <i class="fas fa-warehouse me-2"></i> Dépôts
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if 'mission' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'logistics:mission_list' %}">
                                <i class="fas fa-truck-fast me-2"></i> Missions
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if 'truck' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'logistics:truck_list' %}">
                                <i class="fas fa-truck me-2"></i> Camions
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if 'station' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'logistics:station_list' %}">
                                <i class="fas fa-gas-pump me-2"></i> Stations
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Leaflet JS (ajout) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
